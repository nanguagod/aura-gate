spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        enabled: true
    openai:
      api-key: ${aura-gate-apikey:}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        enabled: false
  datasource:
    pgvector:
      url: jdbc:postgresql://localhost:5432/auragate_ai
      username: postgres
      password: postgres
      driver-class-name: org.postgresql.Driver

# AI 模块配置
search-api:
  api-key: your-api-key-here

logging:
  level:
    org.springframework.ai: INFO
