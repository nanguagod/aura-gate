spring:
  datasource:
    druid:
      url: jdbc:mysql://localhost:3306/auragate?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:123456}
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      driver-class-name: com.mysql.cj.jdbc.Driver
      filters: stat,wall

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis配置
mybatis:
  type-aliases-package: com.auragate.rbac.domain
  mapper-locations: classpath:mapper/**/*.xml

# JWT配置
token:
  header: Authorization
  secret: ${JWT_SECRET:auragate_secret_key_2026_very_long_encryption_key_here}
  expireTime: 300

# 日志
logging:
  level:
    com.auragate.rbac: debug
